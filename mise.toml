[tools]
java = "temurin-11"
ruby = "jruby-9.4.14.0"
maven = "3.9"

[tasks.package]
run = "mvn package"

[tasks.test_java]
description = "Run integration tests with Docker MySQL"
run = "mvn -DrunITs install -Djava.locale.providers=COMPAT,SPI"

[tasks.test]
description = "Run JRuby Minitest tests"
run = "rake test"
depends = ["package"]
