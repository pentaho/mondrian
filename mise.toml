[tools]
java = ["temurin-11", "zulu-8", "temurin-17", "temurin-21", "temurin-25"]
ruby = "jruby-9.4.14.0"
maven = "3.9"

[tasks.package]
# Keep -q (quiet build: only WARN/ERROR output). Drop it locally when
# troubleshooting a build, but don't commit the removal.
run = "mvn package -q -DskipTests"

[tasks.test]
description = "Run JRuby Minitest tests"
run = "rake test"
depends = ["package"]

[tasks.java_test]
description = "Run Java tests, optionally filtered by test class name (e.g., mise java_test NativeFilterMatchingTest)"
run = "bin/java_test"
